services:
  app:
    image: mcr.microsoft.com/devcontainers/typescript-node:22
    command: sleep infinity
    volumes:
      - ../..:/workspaces:cached
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/gl_cuisines?schema=public
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gl_cuisines
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gl_cuisines"]
      interval: 2s
      timeout: 5s
      retries: 15

volumes:
  pgdata:
